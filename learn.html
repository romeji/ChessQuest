<div id="toast-container"></div>
<div class="app">
  <section class="page">
    <div class="teal-hero">
      <div class="subpage-header on-color" style="margin-bottom:2px;">
        <a class="subpage-back" href="index.html"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></a>
        <span class="subpage-title" style="font-size:1.05rem;">Apprendre</span>
        <span class="subpage-badge">
          <svg viewBox="0 0 24 24"><path d="M6 3h12l4 6-10 12L2 9Z"/><path d="M2 9h20M9 3l-2 6 5 12 5-12-2-6"/></svg>
          <span id="learn-gem-count">0</span>
        </span>
      </div>
      <h2 class="teal-title">Ouvertures</h2>
      <p class="teal-sub">Choisis ton répertoire et deviens imbattable !</p>
      <div class="skill-path" id="skill-path"></div>
    </div>

    <input class="search-input" id="opening-search" type="text" placeholder="Rechercher une ouverture… (ex : Najdorf, Londres, Caro-Kann)">
    <div class="opening-groups" id="opening-groups"></div>
    <p class="section-sub" style="margin-top:14px;">Touche une ouverture pour l'ouvrir dans <a href="openings.html" style="color:var(--coral);font-weight:600;">S'entraîner</a>.</p>
  </section>
</div>

<nav class="tabbar">
  <button class="tabbar-item" data-tab="home" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg><span>Accueil</span>
  </button>
  <button class="tabbar-item" data-tab="learn" onclick="location.href='learn.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><circle cx="6" cy="19" r="2.5"/><circle cx="12" cy="11" r="2.5"/><circle cx="18" cy="5" r="2.5"/><path d="M6 16.5V13a2 2 0 0 1 2-2h1.5M14.5 9H16a2 2 0 0 0 2-2V5.5"/></svg><span>Parcours</span>
  </button>
  <button class="tabbar-item" data-tab="play" onclick="location.href='openings.html'">

  </button>
  <button class="tabbar-item" data-tab="progress" onclick="location.href='profile.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 15l4-5 3 3 5-7"/></svg><span>Progrès</span>

  <button class="tabbar-item" data-tab="profile" onclick="location.href='profile.html'">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.4/confetti.min.js"></script>
<script src="assets/js/progress.js"></script>
<script src="assets/js/chesscom.js"></script>
<script src="assets/js/animations.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/navigation.js"></script>
<script src="assets/js/board.js"></script>
<script src="assets/js/openings.js"></script>
<script>
const SKILL_ICON_CHECK = '<svg viewBox="0 0 24 24"><path d="M4 12l6 6L20 6"/></svg>';
const SKILL_ICON_TROPHY_SM = '<svg viewBox="0 0 24 24"><path d="M7 4h10v5a5 5 0 0 1-10 0V4Z"/><path d="M7 5H4a3 3 0 0 0 3 4M17 5h3a3 3 0 0 1-3 4"/><path d="M12 14v3M9 20h6l-1-3H10l-1 3Z"/></svg>';
const SKILL_ICON_LOCK = '<svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/></svg>';

function renderSkillPath(){
  const el = document.getElementById('skill-path');
  const mastered = PROGRESS.mastered || {};
  const attempts = PROGRESS.attempts || {};
  const statusFor = key => mastered[key] ? 'done' : ((attempts[key] || 0) ? 'progress' : 'locked');
  const island = (key, title, icon, extra='') => `<a class="map-island ${statusFor(key)}" href="openings.html?opening=${key}">
    <span class="island-ground"><span class="island-rock"></span><span class="island-tree tree-a"></span><span class="island-tree tree-b"></span><span class="island-piece">${icon}</span></span>
    <span class="map-label">${title}</span><span class="map-state">${mastered[key]?'Maîtrisée':((attempts[key]||0)?'En cours':'À découvrir')}</span>${extra}</a>`;
  el.innerHTML = `
    <svg class="map-route" viewBox="0 0 320 760" preserveAspectRatio="none" aria-hidden="true"><path d="M160 34 C55 95 270 145 162 225 S52 355 172 427 S285 535 150 610 S55 700 164 744"/></svg>
    <span class="map-cloud cloud-one"></span><span class="map-cloud cloud-two"></span><span class="map-cloud cloud-three"></span>
    <div class="map-stop stop-italian">${island('italienne','Italienne','♜')}</div>
    <div class="map-stop stop-spanish">${island('espagnole','Espagnole','♞')}</div>
    <div class="map-stop stop-sicilian">${island('najdorf','Sicilienne','♛')}</div>
    <section class="map-stop stop-queens">
      ${island('qgd','Gambit Dame','♕','<span class="map-module-count">3 modules</span>')}
      <div class="queen-submodules"><a href="openings.html?opening=qgd">Refusé</a><a href="openings.html?opening=qga">Accepté</a><a href="openings.html?opening=slav">Slave</a></div>
    </section>
    <a class="map-chest" href="#opening-groups"><span>♜</span><b>Explorer toutes les ouvertures</b></a>`;
  document.getElementById('learn-gem-count').textContent = PROGRESS.xp || 0;
}

function renderOpeningGroups(){
  const container = document.getElementById('opening-groups');
  const mastered = PROGRESS.mastered || {};
  container.innerHTML = CATEGORIES.map(cat => `
    <details class="opening-category" ${cat.key==='favorites' ? 'open' : ''}>
      <summary>${escapeHtml(cat.title)}</summary>
      <div class="opening-buttons">
        ${cat.lines.map(key => {
          const o = OPENINGS[key];
          const check = mastered[key] ? '<span class="mastery-badge-inline">\u2713</span>' : '';
          return `<a class="line-btn" href="openings.html?opening=${key}"><span>${escapeHtml(o.name)}${check}</span><span class="n-moves">${o.moves.length} demi-coups</span></a>`;
        }).join('')}
      </div>
    </details>
  `).join('');
}

document.getElementById('opening-search').addEventListener('input', function(){
  const q = this.value.trim().toLowerCase();
  document.querySelectorAll('#opening-groups details.opening-category').forEach(details => {
    let visibleCount = 0;
    details.querySelectorAll('.line-btn').forEach(btn => {
      const name = btn.querySelector('span').textContent.toLowerCase();
      const match = q === '' || name.includes(q);
      btn.classList.toggle('hidden', !match);
      if(match) visibleCount++;
    });
    details.classList.toggle('hidden', visibleCount === 0);
    if(q !== '' && visibleCount > 0) details.open = true;
  });
});

renderSkillPath();
renderOpeningGroups();
</script>
</body>
</html>
