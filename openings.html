<body data-page="play">
<div id="toast-container"></div>
<div class="app">
  <section class="page">
    <div class="lesson-header">
      <a class="lesson-back" href="learn.html"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></a>
      <div>
        <div class="lesson-title" id="line-name">Choisis une ouverture</div>
        <div class="lesson-progress-label" id="lesson-progress-label"></div>
      </div>
    </div>
    <div class="track" style="margin-bottom:18px;"><div class="track-fill" id="lesson-track-fill"></div></div>

    <div class="board-frame" style="margin:0 auto 14px;display:block;width:fit-content;">
      <div class="coord-ranks" id="train-ranks"></div>
      <div id="train-board"></div>
      <div class="coord-files" id="train-files"></div>
    </div>
    <div class="progress-dots" id="train-dots" style="justify-content:center;margin-bottom:14px;"></div>

    <div class="home-goal-label" style="margin-bottom:4px;">Objectif de la ligne</div>
    <p class="lesson-desc" id="line-intro">Sélectionne une ouverture pour commencer.</p>

    <details class="opening-category" style="margin-bottom:14px;">
      <summary>Pourquoi jouer cette ouverture ?</summary>
      <p class="lesson-desc" id="line-about" style="padding:0 16px 14px;"></p>
    </details>

    <div class="feedback-box" id="train-feedback">Choisis une ouverture pour démarrer.</div>
    <ol class="move-list" id="train-move-list" style="margin:14px 0;"><li class="empty">Aucun coup joué</li></ol>

    <div class="btn-row">
      <button class="btn secondary" id="hint-btn">Indice</button>
      <button class="btn secondary" id="reset-btn">Recommencer</button>
      <button class="tts-btn active" id="autohint-toggle">Indices auto</button>
    </div>

    <details class="opening-category" style="margin-top:20px;">
      <summary>Choisir une autre ouverture</summary>
      <div class="opening-buttons" id="quick-picker"></div>
    </details>
  </section>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.4/confetti.min.js"></script>
<script src="assets/js/progress.js"></script>
<script src="assets/js/animations.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/navigation.js"></script>
<script src="assets/js/board.js"></script>
<script src="assets/js/openings.js"></script>
<script>
function renderDots(){
  const el = document.getElementById('train-dots');
  if(!currentLine){ el.innerHTML = ''; return; }
  el.innerHTML = currentLine.moves.map((_,i)=>`<span class="dot ${i<trainPly?'done':''} ${i===trainPly?'current':''}"></span>`).join('');
  document.getElementById('lesson-progress-label').textContent = `Leçon ${Math.min(trainPly+1, currentLine.moves.length)}/${currentLine.moves.length}`;
  document.getElementById('lesson-track-fill').style.width = Math.round((trainPly/currentLine.moves.length)*100) + '%';
}
function renderTrainMoveList(){
  const hist = trainGame.history();
  const el = document.getElementById('train-move-list');
  if(hist.length === 0){ el.innerHTML = '<li class="empty">Aucun coup joué</li>'; return; }
  let html = '';
  for(let i=0;i<hist.length;i+=2) html += `<li><span class="num">${Math.floor(i/2)+1}.</span><span>${hist[i]||''}</span><span>${hist[i+1]||''}</span></li>`;
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}
document.getElementById('hint-btn').onclick = () => {
  if(!currentLine) return;
  const expected = currentLine.moves[trainPly];
  const expectedColor = (trainPly % 2 === 0) ? 'w' : 'b';
  if(!expected || expectedColor !== currentLine.forColor) return;
  const g = new Chess(trainGame.fen());
  const match = g.moves({verbose:true}).find(m => m.san === expected.san.replace(/[!?]+$/,''));
  if(match) flashSquares('#train-board', [match.from, match.to], 'hint-square', 900);
};
document.getElementById('reset-btn').onclick = () => { if(currentLine) loadLine(currentLine, currentLineKey); };
document.getElementById('autohint-toggle').onclick = function(){
  autoHintEnabled = !autoHintEnabled;
  this.classList.toggle('active', autoHintEnabled);
  if(!autoHintEnabled) $('#train-board [data-square]').removeClass('suggest-from suggest-to');
  else showExpectedMove();
};

/* Sélecteur rapide (favoris) */
const quickKeys = CATEGORIES.find(c=>c.key==='favorites').lines;
document.getElementById('quick-picker').innerHTML = quickKeys.map(k=>
  `<a class="line-btn" href="openings.html?opening=${k}"><span>${escapeHtml(OPENINGS[k].name)}</span></a>`
).join('');

/* Charge l'ouverture depuis l'URL (?opening=najdorf), sinon Najdorf par défaut */
const params = new URLSearchParams(window.location.search);
const requested = params.get('opening');
const startKey = (requested && OPENINGS[requested]) ? requested : 'najdorf';
ensureTrainBoard();
loadLine(OPENINGS[startKey], startKey);
watchBoardResize('train-board', () => trainBoard, '.page');
</script>
</body>
</html>
