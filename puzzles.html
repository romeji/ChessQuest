<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>ChessQuest — Puzzles</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;500;600;700;800;900&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
<link rel="stylesheet" href="assets/css/variables.css">
<link rel="stylesheet" href="assets/css/reset.css">
<link rel="stylesheet" href="assets/css/layout.css">
<link rel="stylesheet" href="assets/css/components.css">
<link rel="stylesheet" href="assets/css/animations.css">
<link rel="stylesheet" href="assets/css/puzzle.css">
</head>
<body data-page="puzzles">
<div id="toast-container"></div>
<div class="app">
  <section class="page">
    <div class="lesson-header" style="position:relative;">
      <a class="lesson-back" href="index.html"><svg viewBox="0 0 24 24"><path d="M15 5l-7 7 7 7"/></svg></a>
      <div class="lesson-title">Puzzle</div>
      <div class="puzzle-mascot">
        <svg class="puzzle-confetti" viewBox="0 0 60 40" aria-hidden="true">
          <circle cx="6" cy="8" r="2.4" fill="#3CB878"/><circle cx="18" cy="4" r="2" fill="#FFA53D"/>
          <circle cx="30" cy="10" r="2.2" fill="#7C6EF0"/><circle cx="44" cy="5" r="1.8" fill="#4A90E2"/>
        </svg>
        <img src="assets/illustrations/crown-mascot.png" alt="" onerror="this.remove();">
      </div>
    </div>

    <div class="puzzle-streak-row">
      <span class="puzzle-streak-label">Série : <strong id="puzzle-streak-value">0</strong></span>
      <span class="puzzle-streak-flame">🔥</span>
      <span class="puzzle-rating-inline">· Classement <strong id="puzzle-rating-value">1000</strong><span class="pr-delta" id="puzzle-rating-delta"></span></span>
    </div>

    <div class="puzzle-source-row">
      <button class="tts-btn active" id="src-classic">Puzzles classiques</button>
      <button class="tts-btn" id="src-random">Défi aléatoire</button>
      <button class="tts-btn" id="src-mistakes">Mes erreurs <span id="mistakes-count-badge"></span></button>
    </div>
    <div class="theme-filter-row" id="theme-filter-row"></div>

    <div class="puzzle-card">
      <div class="puzzle-card-head">
        <div class="puzzle-question" id="puzzle-question">Trouve le meilleur coup !</div>
        <div class="puzzle-kind" id="puzzle-kind">Coup gagnant</div>
      </div>
      <div class="board-frame" style="margin:0 auto;display:block;width:fit-content;">
        <div class="coord-ranks" id="puzzle-ranks"></div>
        <div id="puzzle-board"></div>
        <div class="coord-files" id="puzzle-files"></div>
      </div>
    </div>
    <div class="progress-dots" id="puzzle-dots" style="justify-content:center;margin:12px 0 10px;"></div>

    <div class="feedback-box" id="puzzle-feedback">Sélectionne une source de puzzles.</div>
    <div class="mcq-options" id="mcq-options"></div>

    <div class="puzzle-stats-toggle" id="puzzle-stats-toggle">Voir mes statistiques</div>
    <div class="stats-row hidden" id="puzzle-stats"></div>
  </section>
</div>

<nav class="tabbar">
  <button class="tabbar-item" data-tab="home" onclick="location.href='index.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M3 11l9-7 9 7"/><path d="M5 10v10h5v-6h4v6h5V10"/></svg><span>Accueil</span>
  </button>
  <button class="tabbar-item" data-tab="learn" onclick="location.href='learn.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><circle cx="6" cy="19" r="2.5"/><circle cx="12" cy="11" r="2.5"/><circle cx="18" cy="5" r="2.5"/><path d="M6 16.5V13a2 2 0 0 1 2-2h1.5M14.5 9H16a2 2 0 0 0 2-2V5.5"/></svg><span>Parcours</span>
  </button>
  <button class="tabbar-item" data-tab="play" onclick="location.href='entrainement.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M12 3v3m-3 0h6M8 9h8l-1 4H9L8 9Z"/><path d="M7 20l1.5-7h7L17 20Z"/><path d="M6 20h12"/></svg><span>Jouer</span>
  </button>
  <button class="tabbar-item" data-tab="progress" onclick="location.href='progress.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M7 15l4-5 3 3 5-7"/></svg><span>Progrès</span>
  </button>
  <button class="tabbar-item" data-tab="profile" onclick="location.href='profile.html'">
    <svg viewBox="0 0 24 24" class="tabicon"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.5-7 8-7s8 3 8 7"/></svg><span>Profil</span>
  </button>
</nav>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.4/confetti.min.js"></script>
<script src="assets/js/progress.js"></script>
<script src="assets/js/chesscom.js"></script>
<script src="assets/js/animations.js"></script>
<script src="assets/js/app.js"></script>
<script src="assets/js/navigation.js"></script>
<script src="assets/js/board.js"></script>
<script src="assets/js/openings.js"></script>
<script src="assets/js/puzzles.js"></script>
<script>
document.getElementById('src-classic').onclick = () => {
  puzzleSource = 'classic';
  document.getElementById('src-classic').classList.add('active');
  document.getElementById('src-random').classList.remove('active');
  document.getElementById('src-mistakes').classList.remove('active');
  renderThemeFilters(); buildPuzzleQueue(); loadPuzzle(0);
};
document.getElementById('src-mistakes').onclick = () => {
  puzzleSource = 'mistakes';
  document.getElementById('src-mistakes').classList.add('active');
  document.getElementById('src-classic').classList.remove('active');
  document.getElementById('src-random').classList.remove('active');
  renderThemeFilters(); buildPuzzleQueue(); loadPuzzle(0);
};
document.getElementById('src-random').onclick = () => {
  puzzleSource = 'random';
  document.getElementById('src-random').classList.add('active');
  document.getElementById('src-classic').classList.remove('active');
  document.getElementById('src-mistakes').classList.remove('active');
  renderThemeFilters(); generateRandomPuzzle();
};

document.getElementById('puzzle-stats-toggle').onclick = function(){
  const row = document.getElementById('puzzle-stats');
  const nowHidden = row.classList.toggle('hidden');
  this.textContent = nowHidden ? 'Voir mes statistiques' : 'Masquer les statistiques';
};

ensurePuzzleBoard();
refreshPuzzleHeader();
watchBoardResize('puzzle-board', () => puzzleBoard, '.page');
</script>
</body>
</html>
